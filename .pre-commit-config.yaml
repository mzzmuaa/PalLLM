default_language_version:
  python: python3

minimum_pre_commit_version: "3.7.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^artifacts/'
      - id: end-of-file-fixer
        exclude: '^artifacts/'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-json

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: palllm-path-audit
        name: PalLLM broken-path reference audit
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/path_reference_audit.ps1
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        files: ''

      - id: palllm-public-copy-audit
        name: PalLLM publication copy audit
        entry: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/audit_public_copy.ps1
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        files: ''
