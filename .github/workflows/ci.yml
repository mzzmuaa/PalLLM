name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PalLLM primarily targets Windows (UE4SS + Palworld), but the
        # PalLLM.Domain and PalLLM.Sidecar projects are portable .NET 10 so
        # we exercise both to keep the portable seams honest.
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore PalLLM.sln

      - name: Build
        run: dotnet build PalLLM.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test PalLLM.sln
          --configuration Release --no-build --nologo --verbosity normal
          --collect:"XPlat Code Coverage"
          --settings tests/PalLLM.Tests/coverlet.runsettings
          --results-directory ${{ github.workspace }}/TestResults

      - name: Install ReportGenerator
        if: matrix.os == 'ubuntu-latest'
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.5

      - name: Render coverage summary
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -eu
          shopt -s globstar nullglob
          reports=(${{ github.workspace }}/TestResults/**/coverage.cobertura.xml)
          if [ ${#reports[@]} -eq 0 ]; then
            echo "No coverage files produced — coverlet.collector may not be wired up."
            exit 1
          fi
          # MarkdownSummaryGithub writes a SummaryGithub.md suitable for the
          # Actions step summary. Also emit HtmlInline for the uploaded artifact
          # so a contributor can download, open index.html, and see line-level
          # drilldown without running the tooling locally.
          reportgenerator \
            "-reports:${{ github.workspace }}/TestResults/**/coverage.cobertura.xml" \
            "-targetdir:${{ github.workspace }}/CoverageReport" \
            "-reporttypes:HtmlInline;MarkdownSummaryGithub;TextSummary" \
            "-assemblyfilters:+PalLLM.Domain;+PalLLM.Sidecar"
          echo "## Code coverage" >> $GITHUB_STEP_SUMMARY
          cat ${{ github.workspace }}/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Full HTML drilldown report is attached as the \`coverage-report\` artifact._" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage HTML report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: ${{ github.workspace }}/CoverageReport
          retention-days: 14

  doc-drift:
    name: doc drift audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"

      - name: Assert workflow actions are SHA-pinned
        shell: pwsh
        run: |
          ./scripts/audit-workflow-action-pins.ps1

      - name: Assert committed OpenAPI snapshot matches the live route surface
        shell: pwsh
        run: |
          ./scripts/export-openapi.ps1 -Verify -Configuration Release

      - name: Assert the mojibake regression does not come back
        shell: bash
        run: |
          if grep -rn "â€" src/ mod/ 2>/dev/null; then
            echo "Mojibake detected in source — UTF-8-as-Windows-1252 regression. See CHANGELOG.md 'Fixed' for history."
            exit 1
          fi

      - name: Assert doc counts agree with code
        shell: bash
        run: |
          set -eu

          # 1. /api route count.
          code_routes=$(grep -cE 'api\.Map(Get|Post|Put|Delete|Patch)' src/PalLLM.Sidecar/Program.cs)
          roadmap_routes=$(grep -oE '`[0-9]+` `/api` routes' docs/ROADMAP.md | grep -oE '[0-9]+' | head -1)
          readme_routes=$(grep -oE '\*\*[0-9]+ `/api` routes\*\*' README.md | grep -oE '[0-9]+' | head -1)
          if [ "$code_routes" != "$roadmap_routes" ] || [ "$code_routes" != "$readme_routes" ]; then
            echo "Route count drift: code=$code_routes, ROADMAP=$roadmap_routes, README=$readme_routes."
            exit 1
          fi

          # 1b. Operational + protocol route counts must agree with API.md and ROADMAP.md.
          # Pass 370 (CI parity): the dashboard root route is now `app.MapGet("/", ...)`
          # served alongside `app.MapStaticAssets(...)` rather than the older
          # `UseDefaultFiles() + UseStaticFiles()` middleware pair. Count the
          # MapGet("/") line directly so the CI bash counter matches the
          # PowerShell audit in `scripts/run_full_audit.ps1` (which already
          # uses the same pattern).
          code_operational_routes=$(grep -cE 'app\.MapGet\("/metrics"|app\.MapGet\("/"|app\.MapHealthChecks\(|app\.MapOpenApi' src/PalLLM.Sidecar/Program.cs)
          code_protocol_routes=$(grep -cE 'app\.MapMcp\("/mcp"\)' src/PalLLM.Sidecar/Program.cs)
          api_routes=$(grep -oE 'Total `/api` routes: [0-9]+' docs/API.md | grep -oE '[0-9]+' | head -1)
          api_operational_routes=$(grep -oE 'Operational routes outside `/api`: [0-9]+' docs/API.md | grep -oE '[0-9]+' | head -1)
          api_protocol_routes=$(grep -oE 'Separate protocol route: [0-9]+' docs/API.md | grep -oE '[0-9]+' | head -1)
          roadmap_operational_routes=$(grep -oE '`[0-9]+` operational routes outside `/api`' docs/ROADMAP.md | grep -oE '[0-9]+' | head -1)
          roadmap_protocol_routes=$(grep -oE '`[0-9]+` separate protocol route' docs/ROADMAP.md | grep -oE '[0-9]+' | head -1)
          if [ "$code_routes" != "$api_routes" ]; then
            echo "API.md /api route drift: code=$code_routes, API=$api_routes."
            exit 1
          fi
          if [ "$code_operational_routes" != "$api_operational_routes" ] || [ "$code_operational_routes" != "$roadmap_operational_routes" ]; then
            echo "Operational route drift: code=$code_operational_routes, API=$api_operational_routes, ROADMAP=$roadmap_operational_routes."
            exit 1
          fi
          if [ "$code_protocol_routes" != "$api_protocol_routes" ] || [ "$code_protocol_routes" != "$roadmap_protocol_routes" ]; then
            echo "Protocol route drift: code=$code_protocol_routes, API=$api_protocol_routes, ROADMAP=$roadmap_protocol_routes."
            exit 1
          fi
          for marker in '/openapi/v1.json' '/openapi/v1.yaml' 'POST /mcp' 'application/health+json'; do
            if ! grep -Fq "$marker" docs/API.md; then
              echo "docs/API.md is missing required contract marker: $marker"
              exit 1
            fi
          done

          # 2. Feature catalog count (Id = "..." lines).
          code_features=$(grep -cE 'Id = "[a-z0-9-]+"' src/PalLLM.Domain/Runtime/PalLlmFeatureCatalog.cs)
          roadmap_features=$(grep -oE '`[0-9]+` feature-catalog entries' docs/ROADMAP.md | grep -oE '[0-9]+' | head -1)
          if [ "$code_features" != "$roadmap_features" ]; then
            echo "Feature count drift: code=$code_features, ROADMAP=$roadmap_features."
            exit 1
          fi

          # 3. Fallback strategy count (Try*/CreateGeneralDirector defs in the engine).
          code_strategies=$(grep -cE '^\s*private static FallbackBehaviorDecision (Try[A-Z][A-Za-z]+|CreateGeneralDirector)' src/PalLLM.Domain/Runtime/FallbackBehaviorEngine.cs)
          roadmap_strategies=$(grep -oE '`[0-9]+` deterministic fallback strategies' docs/ROADMAP.md | grep -oE '[0-9]+' | head -1)
          if [ "$code_strategies" != "$roadmap_strategies" ]; then
            echo "Strategy count drift: code=$code_strategies, ROADMAP=$roadmap_strategies."
            exit 1
          fi

          # 4. Test count — source vs ROADMAP vs README pinned tail.
          # Pass 372 (CI parity, take 2): the PowerShell audit in
          # scripts/run_full_audit.ps1 uses the pattern
          # `^\s*\[(?:TestCase|Test)(?:\(|\])` and counts both NUnit
          # attributes. The previous CI bash counter matched only
          # `[Test]` so it under-counted by ~271 cases. Also pass `-a`
          # so adversarial-fuzz test files with embedded control bytes
          # (Pass 355) are scanned as text, not flagged as binary.
          code_tests=$(grep -rhoaE '^\s*\[(TestCase|Test)(\(|\])' tests/PalLLM.Tests/*.cs | wc -l | tr -d ' ')
          roadmap_tests=$(grep -oE '`[0-9]+` passing NUnit tests' docs/ROADMAP.md | grep -oE '[0-9]+' | head -1)
          readme_tests=$(grep -oE 'Passed: [0-9]+' README.md | grep -oE '[0-9]+' | head -1)
          if [ -z "$code_tests" ] || [ -z "$roadmap_tests" ] || [ -z "$readme_tests" ]; then
            echo "Could not extract test counts — check README/ROADMAP formatting."
            exit 1
          fi
          if [ "$code_tests" != "$roadmap_tests" ] || [ "$roadmap_tests" != "$readme_tests" ]; then
            echo "Test count drift: code=$code_tests, ROADMAP=$roadmap_tests, README=$readme_tests."
            exit 1
          fi

          echo "All doc counts agree with code:"
          echo "  /api routes:         $code_routes"
          echo "  Operational routes:  $code_operational_routes"
          echo "  Protocol routes:     $code_protocol_routes"
          echo "  Feature entries:     $code_features"
          echo "  Fallback strategies: $code_strategies"
          echo "  Test count:          $code_tests"

      - name: Assert public copy stays publication-safe
        shell: pwsh
        run: |
          ./scripts/audit_public_copy.ps1 -WriteReportPath artifacts/public-copy-audit.md

      - name: Assert repo-local path references resolve
        shell: pwsh
        run: |
          ./scripts/path_reference_audit.ps1 -WriteReportPath artifacts/path-reference-audit.json

      - name: Assert markdown links resolve
        shell: bash
        run: |
          set -eu
          # Extract every relative file link from root markdown + docs/.
          # Skips URLs, anchors, and query strings; resolves each against the
          # repo root and docs/ so "foo.md" and "docs/foo.md" both work.
          # Pass 374a: also skip references into artifacts/ — that
          # directory is gitignored and exists only after a local
          # audit run, so audit-pointer links in HANDOFF.md and
          # CHANGELOG.md historical entries would falsely fail on a
          # fresh CI checkout. The PowerShell mirror audit
          # (Drift_Dangling_markdown_links in scripts/run_full_audit.ps1)
          # passes locally because the local tree has artifacts/.
          missing=0
          while read -r link; do
            [ -z "$link" ] && continue
            [[ "$link" == http* ]] && continue
            [[ "$link" == mailto:* ]] && continue
            # Pass 374a: artifacts/ and ../artifacts/ are gitignored audit outputs.
            [[ "$link" == artifacts/* ]] && continue
            [[ "$link" == ../artifacts/* ]] && continue
            found=no
            for base in . docs; do
              path="$base/$link"
              if [ -e "$path" ]; then
                found=yes
                break
              fi
            done
            if [ "$found" != "yes" ]; then
              echo "Dangling link target: $link"
              missing=$((missing + 1))
            fi
          done < <(grep -rhoE '\]\([^)]+\.(md|ps1|cs|lua|json|bat|sln|yml|txt)[^)]*\)' *.md docs/*.md 2>/dev/null | sed 's/^](//' | sed 's/)$//' | sed 's/#.*//' | sort -u)
          if [ "$missing" -gt 0 ]; then
            echo "$missing dangling link target(s) found. Fix the references or add the missing files."
            exit 1
          fi
          echo "All markdown links resolve."
